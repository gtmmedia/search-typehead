# Production docker-compose file for running pre-built images.
# Replace <github-username> with your actual GitHub username/organization (lowercase).
# Replace <repository-name> with your actual repository name (lowercase).

services:
  backend:
    image: ghcr.io/<github-username>/<repository-name>-backend:latest
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: always

  frontend:
    image: ghcr.io/<github-username>/<repository-name>-frontend:latest
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always
