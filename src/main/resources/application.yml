# ============================================================
# Search Typeahead Application Configuration
# ============================================================

server:
  port: 8080

spring:
  application:
    name: search-typeahead
  datasource:
    url: jdbc:h2:file:./data/search_db;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false

# ============================================================
# Dataset Configuration
# Path to the CSV file loaded on startup.
# Format: query,count
# ============================================================
dataset:
  csv-path: classpath:queries.csv

# ============================================================
# Actuator Endpoints
# Expose health and metrics for monitoring.
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
  endpoint:
    health:
      show-details: always

# ============================================================
# Logging
# ============================================================
logging:
  level:
    com.typeahead: DEBUG
    root: INFO
